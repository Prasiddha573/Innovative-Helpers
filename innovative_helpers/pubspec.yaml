name: innovative_helpers
description: "Real-Time Tactical Disaster Simulation App for Kavrepalanchok District"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  fluttertoast: ^8.2.4

  # State Management
  get: ^4.7.3

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0

  # Map & Location
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Network & Utils
  http: ^1.6.0
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
